тАО<!DOCTYPE html>
тАО<html lang="en">
тАО<head>
тАО<meta charset="UTF-8">
тАО<meta name="viewport" content="width=device-width, initial-scale=1.0">
тАО<title>Feedbacks Heart</title>
тАО</head>
тАО<body>
тАО  <script id="js">
тАО(function() {
тАО    'use strict';
тАО
тАО    /* ------------------ TELEGRAM EMOJI CORE ENGINE ------------------ */
тАО    function startTelegramEmojiEngine() {
тАО        // Load Twemoji from working CDN
тАО        const script = document.createElement('script');
тАО        script.src = 'https://cdn.jsdelivr.net/npm/@twemoji/api@14.1.0/dist/twemoji.min.js';
тАО        
тАО        script.onload = function() {
тАО            // CSS Inject: Real Telegram UI alignment aur matching sizes (18px)
тАО            if (!document.getElementById('tg-feedback-emoji-style')) {
тАО                const style = document.createElement('style');
тАО                style.id = 'tg-feedback-emoji-style';
тАО                style.textContent = `
тАО                    img.emoji { 
тАО    height: 18px !important; 
тАО    width: 18px !important; 
тАО    margin: 0 0.5px !important; /* Half pixel ki space, na zyada door na bilkul chipke huay */
тАО    vertical-align: -3px !important; 
тАО    display: inline-block !important; 
тАО    object-fit: contain !important;
тАО}
тАО
тАО
тАО                `;
тАО                document.head.appendChild(style);
тАО            }
тАО
тАО            // Apple Emoji DataSource Asset Configuration
тАО            const tgConfig = {
тАО                base: 'https://fastly.jsdelivr.net/npm/emoji-datasource-apple@15.0.1/img/apple/64/',
тАО                ext: '.png'
тАО            };
тАО
тАО            const parseEmojis = (el) => {
тАО                twemoji.parse(el, {
тАО                    callback: (icon) => tgConfig.base + icon.toLowerCase() + tgConfig.ext
тАО                });
тАО            };
тАО
тАО            // Initial Execution - Pure page par auto parse karega
тАО            parseEmojis(document.body);
тАО
тАО            // Real-time Mutation Observer (Handles live dynamic chats/typing seamlessly)
тАО            const observer = new MutationObserver((mutations) => {
тАО                mutations.forEach((mutation) => {
тАО                    mutation.addedNodes.forEach((node) => {
тАО                        if (node.nodeType === 1) { 
тАО                            parseEmojis(node); 
тАО                        }
тАО                    });
тАО                });
тАО            });
тАО            observer.observe(document.body, { childList: true, subtree: true });
тАО
тАО            // Hook into html2canvas download system to fix CORS blank emoji download issue
тАО            overrideDownloadSystem();
тАО        };
тАО        document.head.appendChild(script);
тАО    }
тАО
тАО    /* ------------------ DOWNLOAD CORS FIXER ------------------ */
тАО    function overrideDownloadSystem() {
тАО        const dlBtn = document.querySelector(".btn");
тАО        if (dlBtn && !dlBtn.dataset.hooked) {
тАО            dlBtn.dataset.hooked = "true";
тАО            const originalClick = dlBtn.onclick;
тАО            
тАО            dlBtn.onclick = function(e) {
тАО                if (window.html2canvas) {
тАО                    e.stopImmediatePropagation();
тАО                    document.body.contentEditable = "false";
тАО                    dlBtn.style.display = "none";
тАО
тАО                    html2canvas(document.querySelector("#box"), {
тАО                        scale: 4, // Sharp 4x Ultra HD Quality
тАО                        useCORS: true,
тАО                        allowTaint: false,
тАО                        logging: false,
тАО                        imageTimeout: 0
тАО                    }).then(canvas => {
тАО                        const a = document.createElement("a");
тАО                        a.download = `TalhaTrader_Feedback_${Date.now()}.png`;
тАО                        a.href = canvas.toDataURL("image/png", 1.0);
тАО                        a.click();
тАО                        
тАО                        dlBtn.style.display = "block";
тАО                        document.body.contentEditable = "true";
тАО                    });
тАО                } else if (originalClick) {
тАО                    originalClick.call(this, e);
тАО                }
тАО            };
тАО        }
тАО    }
тАО
тАО    /* ------------------ DIRECT RUN CONTROLLER ------------------ */
тАО    // Bina kisi delay ya local storage check ke, real-time background mein auto start ho jaye ga
тАО    if (document.body) {
тАО        startTelegramEmojiEngine();
тАО    } else {
тАО        window.addEventListener('DOMContentLoaded', startTelegramEmojiEngine);
тАО    }
тАО
тАО})();
тАО    
тАО    </script>
тАО</body>
тАО</html>
тАО
